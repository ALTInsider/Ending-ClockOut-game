    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100vh; background:#04000c; overflow:hidden; font-family:'Trueno',Arial,sans-serif; }
    canvas { position:absolute; top:0; left:0; width:100%; height:100%; }

    /* ══════════════════════════════════════════
       TOP BAR — single line: title | count | timer
    ══════════════════════════════════════════ */
    #topbar {
      position:absolute; top:0; left:0; right:0; height:52px;
      background:rgba(0,0,0,0.65);
      border-bottom:1px solid rgba(0,229,255,0.18);
      display:flex; align-items:center;
      padding:0 20px; gap:0; z-index:30;
      backdrop-filter:blur(4px);
    }
    #topbar-title {
      font-size:18px; letter-spacing:5px; text-transform:uppercase;
      color:#fff; white-space:nowrap;
      text-shadow:0 0 18px rgba(0,229,255,0.6);
      flex-shrink:0;
    }
    #topbar-title span { color:#00e5ff; }
    #topbar-divider {
      flex:1; height:1px;
      background:linear-gradient(90deg,rgba(0,229,255,.25),rgba(0,229,255,.05));
      margin:0 20px;
    }
    #topbar-count {
      font-size:13px; letter-spacing:3px; text-transform:uppercase;
      color:rgba(255,255,255,0.55); white-space:nowrap; flex-shrink:0;
    }
    #topbar-sep { width:1px; height:22px; background:rgba(255,255,255,0.12); margin:0 16px; flex-shrink:0; }
    #topbar-timer {
      font-size:13px; letter-spacing:3px; text-transform:uppercase;
      color:#ff6b35; white-space:nowrap; flex-shrink:0;
    }

    /* ══════════════════════════════════════════
       ARENA  (left of log panel)
    ══════════════════════════════════════════ */
    /* canvas fills full screen, log panel overlays on right */

    /* ══════════════════════════════════════════
       RIGHT PANEL — event log
    ══════════════════════════════════════════ */
    #log-panel {
      position:absolute; top:52px; right:0; bottom:0; width:300px;
      background:rgba(0,0,0,0.55);
      border-left:1px solid rgba(255,255,255,0.08);
      display:flex; flex-direction:column;
      z-index:20; pointer-events:none;
    }
    #log-header {
      padding:10px 14px 8px;
      font-size:10px; letter-spacing:3px; text-transform:uppercase;
      color:rgba(255,255,255,0.3);
      border-bottom:1px solid rgba(255,255,255,0.07);
      flex-shrink:0;
    }
    #log-entries {
      flex:1; overflow:hidden;
      display:flex; flex-direction:column-reverse;
      padding:8px 0 4px;
    }
    #log-inner {
      display:flex; flex-direction:column; gap:3px; padding:0 10px;
    }
    .log-entry {
      font-size:11px; letter-spacing:.5px; line-height:1.4;
      padding:4px 8px; border-radius:6px;
      background:rgba(255,255,255,0.04);
      animation:logSlide .25s ease-out;
    }
    @keyframes logSlide {
      from { opacity:0; transform:translateX(12px); }
      to   { opacity:1; transform:translateX(0); }
    }
    .log-join   { color:#7cfc00; }
    .log-shield { color:#ffdd57; }
    .log-kill   { color:rgba(255,255,255,0.75); }
    .log-kill .loser  { color:#ff4757; font-weight:700; }
    .log-kill .winner { color:#2ed573; font-weight:700; }
    .log-kill .hp     { color:rgba(255,255,255,0.35); font-size:9px; }
    .log-system { color:rgba(255,255,255,0.3); font-style:italic; }

    /* ══════════════════════════════════════════
       LOBBY OVERLAY  (shown over arena, hidden in battle)
    ══════════════════════════════════════════ */
    #lobby-overlay {
      position:absolute; top:52px; left:0; right:300px; bottom:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:flex-end;
      padding-bottom:32px; gap:14px;
      z-index:25; pointer-events:none;
      transition:opacity .5s;
    }
    #lobby-overlay.hidden { opacity:0; pointer-events:none; }

    #instructions {
      background:rgba(0,0,0,0.6);
      border:1px solid rgba(0,229,255,0.25);
      border-radius:14px; padding:12px 28px; text-align:center;
      pointer-events:none;
    }
    #instructions .inst-line1 {
      font-size:15px; letter-spacing:3px; text-transform:uppercase;
      color:rgba(255,255,255,0.6); margin-bottom:6px;
    }
    #instructions .inst-cmd {
      font-size:22px; letter-spacing:4px; text-transform:uppercase;
      color:#00e5ff;
      text-shadow:0 0 20px rgba(0,229,255,0.5);
    }
    #instructions .inst-line2 {
      font-size:11px; letter-spacing:2px; text-transform:uppercase;
      color:rgba(255,255,255,0.3); margin-top:6px;
    }

    #start-btn {
      pointer-events:all;
      font-family:'Trueno',Arial,sans-serif;
      font-size:16px; letter-spacing:6px; text-transform:uppercase; color:#fff;
      background:linear-gradient(135deg,rgba(0,229,255,.2),rgba(255,0,128,.2));
      border:2px solid rgba(0,229,255,.7); border-radius:40px;
      padding:14px 52px; cursor:pointer;
      box-shadow:0 0 28px rgba(0,229,255,.4),0 0 56px rgba(0,229,255,.12);
      transition:all .2s;
    }
    #start-btn:hover {
      background:linear-gradient(135deg,rgba(0,229,255,.4),rgba(255,0,128,.4));
      box-shadow:0 0 42px rgba(0,229,255,.7),0 0 80px rgba(0,229,255,.22);
      transform:scale(1.04);
    }
    #start-btn:disabled { opacity:.4; cursor:default; transform:none; }

    /* ══════════════════════════════════════════
       COUNTDOWN
    ══════════════════════════════════════════ */
    #countdown {
      position:absolute; top:52px; left:0; right:300px; bottom:0;
      display:flex; align-items:center; justify-content:center;
      pointer-events:none; z-index:28; opacity:0; transition:opacity .15s;
    }
    #countdown-num {
      font-size:200px; letter-spacing:0; color:#fff; line-height:1;
      text-shadow:0 0 60px #ff6b35, 0 0 120px rgba(255,107,53,.5);
      transition:transform .15s ease-out;
    }

    /* ══════════════════════════════════════════
       WINNER OVERLAY
    ══════════════════════════════════════════ */
    #winner-overlay {
      position:absolute; top:52px; left:0; right:300px; bottom:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:28px;
      opacity:0; pointer-events:none; transition:opacity .7s; z-index:20;
    }
    #winner-overlay.visible { opacity:1; pointer-events:all; }
    #pepe-left, #pepe-right {
      position:absolute; top:0; bottom:0; width:200px;
      display:flex; flex-direction:column; overflow:hidden; pointer-events:none;
    }
    #pepe-left  { left:0; }
    #pepe-right { right:0; }
    .pepe-vid   { width:200px; height:173px; object-fit:cover; flex-shrink:0; }
    #winner-center { display:flex; flex-direction:column; align-items:center; gap:22px; padding:0 220px; }
    #winner-eyebrow {
      font-size:18px; letter-spacing:8px; text-transform:uppercase;
      color:rgba(255,215,0,.75); text-shadow:0 0 20px rgba(255,215,0,.4);
      margin-bottom:6px; text-align:center;
    }
    #winner-stats {
      font-family:'Trueno',Arial,sans-serif; font-size:16px; letter-spacing:4px;
      text-transform:uppercase; color:rgba(255,255,255,.6);
      text-align:center; margin-top:4px; line-height:1.6;
    }
    #winner-name {
      font-size:68px; letter-spacing:4px; text-transform:uppercase;
      color:#fff; text-align:center;
      text-shadow:0 0 30px #ffd700,0 0 70px rgba(255,215,0,.4),0 5px 0 rgba(0,0,0,.5);
    }
    #dismiss-btn {
      font-family:'Trueno',Arial,sans-serif; font-size:12px; letter-spacing:4px;
      text-transform:uppercase; color:rgba(255,255,255,.5); background:rgba(0,0,0,.5);
      border:1px solid rgba(255,255,255,.2); border-radius:30px; padding:12px 36px; cursor:pointer;
    }
    #dismiss-btn:hover { color:#fff; border-color:rgba(255,255,255,.5); }

    /* ══════════════════════════════════════════
       RESET BTN
    ══════════════════════════════════════════ */
    #reset-btn {
      position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
      font-family:'Trueno',Arial,sans-serif; font-size:11px; letter-spacing:3px;
      text-transform:uppercase; color:rgba(255,255,255,.28);
      background:rgba(0,0,0,.35); border:1px solid rgba(255,255,255,.1);
      border-radius:20px; padding:8px 24px; cursor:pointer; transition:all .2s; z-index:10;
      opacity:0; pointer-events:none;
    }
    #reset-btn.visible { opacity:1; pointer-events:all; }
    #reset-btn:hover { color:rgba(255,255,255,.7); border-color:rgba(255,255,255,.3); }

    /* ══════════════════════════════════════════
       FINAL SHOWDOWN OVERLAY
    ══════════════════════════════════════════ */
    #showdown-overlay {
      position:absolute; top:52px; left:0; right:300px; bottom:0;
      display:flex; align-items:center; justify-content:center;
      background:rgba(4,0,12,0.82);
      opacity:0; pointer-events:none;
      transition:opacity .6s; z-index:26;
    }
    #showdown-overlay.visible { opacity:1; pointer-events:all; }
    #showdown-vs {
      display:flex; align-items:center; justify-content:center;
      gap:40px; width:100%;
    }
    .showdown-fighter {
      display:flex; flex-direction:column; align-items:center; gap:10px;
      flex:1; max-width:220px;
    }
    .showdown-fighter .sf-initial {
      width:90px; height:90px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-family:'Trueno',Arial,sans-serif; font-size:42px; font-weight:700; color:#fff;
      border:3px solid; box-shadow:0 0 30px;
    }
    .showdown-fighter .sf-name {
      font-family:'Trueno',Arial,sans-serif; font-size:18px; letter-spacing:3px;
      text-transform:uppercase; color:#fff; text-align:center;
      text-shadow:0 0 15px rgba(255,255,255,.4);
    }
    .showdown-fighter .sf-hp {
      font-family:'Trueno',Arial,sans-serif; font-size:13px; letter-spacing:2px;
      color:rgba(255,255,255,.4);
    }
    .showdown-fighter .sf-kills {
      font-family:'Trueno',Arial,sans-serif; font-size:12px; letter-spacing:3px;
      text-transform:uppercase; color:#ff6b35;
      text-shadow:0 0 10px rgba(255,107,53,.5);
    }
    #showdown-mid {
      display:flex; flex-direction:column; align-items:center; gap:14px;
      flex-shrink:0;
    }
    #showdown-title {
      font-family:'Trueno',Arial,sans-serif; font-size:28px; letter-spacing:6px;
      text-transform:uppercase; color:#fff; white-space:nowrap;
      text-shadow:0 0 30px #ff6b35, 0 0 60px rgba(255,107,53,.4);
    }
    #showdown-vs-text {
      font-family:'Trueno',Arial,sans-serif; font-size:72px; letter-spacing:8px;
      color:#ff6b35; line-height:1;
      text-shadow:0 0 40px #ff6b35, 0 0 80px rgba(255,107,53,.5);
      animation:vspulse 1.2s ease-in-out infinite;
    }
    @keyframes vspulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.7; transform:scale(1.06); }
    }
    #showdown-sub {
      font-family:'Trueno',Arial,sans-serif; font-size:12px; letter-spacing:3px;
      text-transform:uppercase; color:#2ed573;
      text-shadow:0 0 12px rgba(46,213,115,.5);
    }
    #showdown-waiting {
      font-family:'Trueno',Arial,sans-serif; font-size:11px; letter-spacing:3px;
      text-transform:uppercase; color:rgba(255,255,255,.35);
      animation:blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:.35} 50%{opacity:.9} }
    #showdown-btn {
      font-family:'Trueno',Arial,sans-serif; font-size:15px; letter-spacing:5px;
      text-transform:uppercase; color:#fff;
      background:linear-gradient(135deg,rgba(255,107,53,.25),rgba(255,0,128,.25));
      border:2px solid rgba(255,107,53,.8); border-radius:40px;
      padding:13px 44px; cursor:pointer;
      box-shadow:0 0 28px rgba(255,107,53,.5);
      transition:all .2s;
    }
    #showdown-btn:hover {
      background:linear-gradient(135deg,rgba(255,107,53,.5),rgba(255,0,128,.5));
      box-shadow:0 0 50px rgba(255,107,53,.8);
      transform:scale(1.05);
    }
  </style>
</head>

<canvas id="c"></canvas>

<!-- TOP BAR -->

resize();

// ── Win / streak tracking (localStorage — persists across streams) ──
const LS_KEY = 'cobr_win_history'; // cobr = Clock-Out Battle Royale

function getHistory(){
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); }
  catch(e){ return {}; }
}
function saveHistory(h){
  try { localStorage.setItem(LS_KEY, JSON.stringify(h)); }
  catch(e){}
}

// Called when battle ends — winner gets wins++ streak++, everyone else streak=0
function recordWin(winnerName, allFighterNames){
  const h = getHistory();
  // Zero streak for every participant who didn't win
  for(const name of allFighterNames){
    if(name === winnerName) continue;
    if(h[name]) h[name].streak = 0;
  }
  // Record the win
  if(!h[winnerName]) h[winnerName] = {wins:0, streak:0};
  h[winnerName].wins++;
  h[winnerName].streak++;
  saveHistory(h);
  return h[winnerName];
}

function getRecord(userName){
  const h = getHistory();
  return h[userName] || {wins:0, streak:0};
}

function ordinal(n){
  const s=['th','st','nd','rd'], v=n%100;
  return n+(s[(v-20)%10]||s[v]||s[0]);
}

// Convert to Blob URL so OBS Chromium can play it (data: URIs blocked for video)
function makePepeBlobUrl(){
  const bin=atob(PEPE_B64), arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return URL.createObjectURL(new Blob([arr],{type:'video/mp4'}));
}
let pepeBlobUrl = null; // created once on first winner screen
function buildPepeColumn(el){
  if(!pepeBlobUrl) pepeBlobUrl=makePepeBlobUrl();
  el.innerHTML='';
  const n = Math.ceil(window.innerHeight / 173) + 1;
  for(let i=0;i<n;i++){
    const v=document.createElement('video');
    v.className='pepe-vid'; v.src=pepeBlobUrl;
    v.autoplay=true; v.loop=true; v.muted=true; v.playsInline=true;
    el.appendChild(v);
  }
}

// ── Config ────────────────────────────────────────────────────
const CFG = {
  radMin:14, radMax:34, radBase:11, radScale:1.1,
  maxSpd:3.2, steerStr:0.04,
  invincFrames:150, steerWindow:[140,100],
  regenInterval:90, shields:3,
  lobbyDrift:0.35,
};
function calcRadius(hp){
  return Math.max(CFG.radMin, Math.min(CFG.radMax, CFG.radBase + Math.sqrt(Math.min(hp,400))*CFG.radScale));
}

// ── Event log ─────────────────────────────────────────────────
const LOG_MAX = 60;
function addLog(html, cls){
  // trim overflow
  while(logInner.children.length >= LOG_MAX) logInner.removeChild(logInner.lastChild);
  const el = document.createElement('div');
  el.className = 'log-entry ' + (cls||'');
  el.innerHTML = html;
  logInner.insertBefore(el, logInner.firstChild);
}
function esc(s){ return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ── Dust ──────────────────────────────────────────────────────
const dust = Array.from({length:35},()=>({
  x:Math.random()*(W-300), y:52+Math.random()*(H-52),
  r:.8+Math.random()*2, opa:.05+Math.random()*.15,
  vx:(Math.random()-.5)*.3, vy:-.2-Math.random()*.45,
  color:PAL[Math.floor(Math.random()*PAL.length)],
}));

// ── FX classes ────────────────────────────────────────────────
class Burst{
  constructor(x,y,color,r){
    this.p=Array.from({length:14},(_,i)=>{
      const a=(i/14)*Math.PI*2,s=2+Math.random()*4;
      return{x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-Math.random(),r:2+Math.random()*4,op:1,color:Math.random()<.6?color:'#fff'};
    });
    this.rr=r; this.rop=1; this.x=x; this.y=y; this.color=color; this.done=false;
  }
  update(){
    let any=false;
    for(const p of this.p){p.x+=p.vx;p.y+=p.vy;p.vy+=.13;p.op-=.03;if(p.op>0)any=true;}
    this.rr+=4; this.rop-=.05; if(this.rop>0)any=true; this.done=!any;
  }
  draw(){
    if(this.rop>0){ctx.save();ctx.globalAlpha=this.rop;ctx.beginPath();ctx.arc(this.x,this.y,this.rr,0,Math.PI*2);ctx.strokeStyle=this.color;ctx.lineWidth=3;ctx.shadowColor=this.color;ctx.shadowBlur=12;ctx.stroke();ctx.restore();}
    for(const p of this.p){if(p.op<=0)continue;ctx.save();ctx.globalAlpha=p.op;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=5;ctx.fill();ctx.restore();}
  }
}
class ShieldPop{
  constructor(x,y){this.x=x;this.y=y;this.r=12;this.op=1;this.done=false;}
  update(){this.r+=3;this.op-=.09;if(this.op<=0)this.done=true;}
  draw(){ctx.save();ctx.globalAlpha=this.op;ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.strokeStyle='#ffdd57';ctx.lineWidth=3;ctx.shadowColor='#ffdd57';ctx.shadowBlur=12;ctx.stroke();ctx.restore();}
}
const CC=['#ffd700','#ff6b35','#ff0080','#00e5ff','#7cfc00','#b44fff'];
class Confetto{
  constructor(){this.x=Math.random()*(W-300);this.y=-20;this.vx=(Math.random()-.5)*1.4;this.vy=1.1+Math.random()*1.3;this.w=7+Math.random()*8;this.h=3+Math.random()*5;this.a=Math.random()*Math.PI;this.va=(Math.random()-.5)*.08;this.color=CC[Math.floor(Math.random()*CC.length)];}
  update(){this.x+=this.vx;this.y+=this.vy;this.vx+=(Math.random()-.5)*.07;this.a+=this.va;if(this.y>H+20){this.x=Math.random()*(W-300);this.y=-20;}}
  draw(){ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.a);ctx.fillStyle=this.color;ctx.shadowColor=this.color;ctx.shadowBlur=3;ctx.fillRect(-this.w/2,-this.h/2,this.w,this.h);ctx.restore();}
}
function rr(ctx,x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}

// ── Fighter ───────────────────────────────────────────────────
let fighters = [];
let colorIdx = 0;

class Fighter{
  constructor(d){
    this.userName=d.userName; this.health=d.health; this.maxHealth=d.health;
    this.color=PAL[colorIdx++ % PAL.length];
    this.radius=calcRadius(d.health);
    this.pulse=Math.random()*Math.PI*2;
    this.alive=true; this.eliminating=false; this.elimTimer=0;
    this.invincible=0; this.flashTimer=0; this.shieldFlash=0;
    this.target=null; this.steerCd=0; this.regenTimer=0; this.shields=CFG.shields;
    // spawn inside arena bounds
    const ar = ARENA_RIGHT(), at = ARENA_TOP();
    this.x = this.radius+20 + Math.random()*(ar - this.radius*2 - 40);
    this.y = at+this.radius+10 + Math.random()*(FLOOR()-at-this.radius*2-20);
    const ang=Math.random()*Math.PI*2;
    this.vx=Math.cos(ang)*CFG.lobbyDrift; this.vy=Math.sin(ang)*CFG.lobbyDrift;
  }
  get isActive(){ return this.alive||this.eliminating; }
  startElim(){ this.alive=false; this.eliminating=true; this.elimTimer=55; }
  kickoffBattle(){
    const spd=1.2+Math.random()*1.8, ang=Math.random()*Math.PI*2;
    this.vx=Math.cos(ang)*spd; this.vy=Math.sin(ang)*spd;
  }

  update(all){
    if(!this.alive){if(this.eliminating){this.elimTimer--;if(this.elimTimer<=0)this.eliminating=false;}return;}
    if(this.invincible>0)this.invincible--;
    if(this.flashTimer>0)this.flashTimer--;
    if(this.shieldFlash>0)this.shieldFlash--;
    this.pulse+=.04;
    const ar=ARENA_RIGHT(), at=ARENA_TOP();
    if(phase==='LOBBY'){
      this.x+=this.vx; this.y+=this.vy;
      const r=this.radius;
      if(this.x-r<0){this.x=r;this.vx=Math.abs(this.vx);}
      if(this.x+r>ar){this.x=ar-r;this.vx=-Math.abs(this.vx);}
      if(this.y-r<at){this.y=at+r;this.vy=Math.abs(this.vy);}
      if(this.y+r>FLOOR()){this.y=FLOOR()-r;this.vy=-Math.abs(this.vy);}
      return;
    }
    // SHOWDOWN: fighters are frozen until beginShowdown() fires
    if(phase==='SHOWDOWN'){
      return;
    }
    // BATTLE
    this.regenTimer++;
    if(this.regenTimer>=CFG.regenInterval){
      this.regenTimer=0; this.health++;
      if(this.health>this.maxHealth)this.maxHealth=this.health;
      this.radius=calcRadius(this.health);
    }
    this.steerCd--;
    if(this.steerCd<=0){
      const o=all.filter(p=>p.alive&&p!==this);
      this.target=o.length?o[Math.floor(Math.random()*o.length)]:null;
      this.steerCd=CFG.steerWindow[0]+Math.floor(Math.random()*CFG.steerWindow[1]);
    }
    if(this.target&&this.target.alive){
      const dx=this.target.x-this.x,dy=this.target.y-this.y,d=Math.sqrt(dx*dx+dy*dy)||1;
      this.vx+=(dx/d)*CFG.steerStr; this.vy+=(dy/d)*CFG.steerStr;
    }
    const spd=Math.sqrt(this.vx*this.vx+this.vy*this.vy);
    if(spd>CFG.maxSpd){this.vx*=CFG.maxSpd/spd;this.vy*=CFG.maxSpd/spd;}
    this.x+=this.vx; this.y+=this.vy;
    const r=this.radius;
    if(this.x-r<0){this.x=r;this.vx=Math.abs(this.vx);}
    if(this.x+r>ar){this.x=ar-r;this.vx=-Math.abs(this.vx);}
    if(this.y-r<at){this.y=at+r;this.vy=Math.abs(this.vy);}
    if(this.y+r>FLOOR()){this.y=FLOOR()-r;this.vy=-Math.abs(this.vy);}
  }

  draw(){
    if(!this.alive&&!this.eliminating)return;
    ctx.save(); ctx.translate(this.x,this.y);
    const t=this.eliminating?(this.elimTimer/55):1;
    ctx.globalAlpha=this.eliminating?t*t:1;
    ctx.scale(this.eliminating?1+(1-t)*.7:1, this.eliminating?1+(1-t)*.7:1);
    const gc=this.eliminating?'#f00':this.shieldFlash>0?'#ffdd57':this.flashTimer>0?'#fff':this.color;
    const gb=this.eliminating?30:(this.flashTimer>0||this.shieldFlash>0)?38:9+Math.sin(this.pulse)*4;
    ctx.shadowColor=gc; ctx.shadowBlur=gb;
    ctx.beginPath(); ctx.arc(0,0,this.radius+2,0,Math.PI*2);
    ctx.strokeStyle=gc; ctx.lineWidth=this.eliminating?3:2; ctx.stroke(); ctx.shadowBlur=0;
    ctx.save(); ctx.beginPath(); ctx.arc(0,0,this.radius,0,Math.PI*2); ctx.clip();
    const g=ctx.createRadialGradient(0,-this.radius*.3,0,0,0,this.radius);
    g.addColorStop(0,this.color+'cc'); g.addColorStop(1,this.color+'33');
    ctx.fillStyle=g; ctx.fillRect(-this.radius,-this.radius,this.radius*2,this.radius*2);
    ctx.fillStyle='#fff'; ctx.shadowColor='rgba(0,0,0,.7)'; ctx.shadowBlur=3;
    ctx.font='bold '+Math.floor(this.radius*.85)+'px Trueno,Arial Black,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(this.userName.charAt(0).toUpperCase(),0,1); ctx.restore();
    if(!this.eliminating)this.drawHUD();
    ctx.restore();
  }

  drawHUD(){
    const r=this.radius, bw=r*2.4, bh=6, bx=-bw/2, by=r+5;
    ctx.fillStyle='rgba(0,0,0,.8)'; ctx.shadowBlur=0;
    rr(ctx,bx-1,by-1,bw+2,bh+2,3); ctx.fill();
    const pct=Math.max(0,Math.min(1,this.health/this.maxHealth));
    const hc=pct>.55?'#2ed573':pct>.28?'#ffa502':'#ff4757';
    if(pct>0){ctx.fillStyle=hc;ctx.shadowColor=hc;ctx.shadowBlur=3;rr(ctx,bx,by,bw*pct,bh,3);ctx.fill();ctx.shadowBlur=0;}
    if(this.shields>0){
      const pr=2.5,gap=8,totalW=(this.shields-1)*gap;
      for(let i=0;i<this.shields;i++){
        const px=-totalW/2+i*gap,py=by+bh+4;
        ctx.beginPath();ctx.arc(px,py,pr,0,Math.PI*2);
        ctx.fillStyle='#ffdd57';ctx.shadowColor='#ffdd57';ctx.shadowBlur=4;ctx.fill();ctx.shadowBlur=0;
      }
    }
    const ty=by+bh+(this.shields>0?14:9);
    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.shadowColor='rgba(0,0,0,.9)'; ctx.shadowBlur=3;
    ctx.fillStyle='#fff'; ctx.font='bold 11px Trueno,Arial Black,sans-serif';
    ctx.fillText(this.userName,0,ty);
    ctx.fillStyle=hc; ctx.font='700 10px Trueno,Arial Black,sans-serif';
    ctx.fillText(this.health+'hp',0,ty+12); ctx.shadowBlur=0;
  }
}

// ── Add fighter (works in LOBBY phase) ───────────────────────
// silent=true suppresses the log entry (used for bulk/test loads)
function addFighter(userName, health, silent=false){
  if(phase !== 'LOBBY') return false;
  // deduplicate
  if(fighters.find(f=>f.userName===userName)) return false;
  const f = new Fighter({userName, health});
  fighters.push(f);
  updateStartBtn();
  if(!silent){
    addLog('⚡ <b>'+esc(userName)+'</b> joined! <span style="color:rgba(255,255,255,.4);font-size:9px">('+health+'hp)</span>', 'log-join');
  }
  return true;
}

function updateStartBtn(){
  const n=fighters.length;
  topbarCount.textContent = n + (n===1?' Fighter':' Fighters');
  startBtn.textContent = '⚔  Start Battle  ('+n+' fighter'+(n===1?'':''+'s')+')';
  startBtn.disabled = n < 2;
}

// ── Collision ─────────────────────────────────────────────────
let bursts=[], shieldPops=[], confetti=[];
let t0=null, t1=null;

function checkCollisions(){
  if(phase!=='BATTLE' && phase!=='SHOWDOWN_ACTIVE')return;
  const alive=fighters.filter(p=>p.alive&&p.invincible===0);
  for(let i=0;i<alive.length;i++) for(let j=i+1;j<alive.length;j++){
    const a=alive[i],b=alive[j],dx=b.x-a.x,dy=b.y-a.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<a.radius+b.radius)resolve(a,b,dx,dy,dist);
  }
}
function resolve(a,b,dx,dy,dist){
  const nx=dx/(dist||1),ny=dy/(dist||1),dot=(a.vx-b.vx)*nx+(a.vy-b.vy)*ny;
  if(dot>0){a.vx-=dot*nx*1.1;a.vy-=dot*ny*1.1;b.vx+=dot*nx*1.1;b.vy+=dot*ny*1.1;}
  const ov=(a.radius+b.radius-dist)/2+1;
  a.x-=nx*ov;a.y-=ny*ov;b.x+=nx*ov;b.y+=ny*ov;

  // In SHOWDOWN_ACTIVE: winner is whoever is moving TOWARD the other (momentum)
  const isShowdown = (phase === 'SHOWDOWN_ACTIVE');
  let winner, loser;
  if(isShowdown){
    // dot product of each fighter's velocity toward the other
    const dx=b.x-a.x, dy=b.y-a.y, dist2=Math.sqrt(dx*dx+dy*dy)||1;
    const aToward = (a.vx*(dx/dist2) + a.vy*(dy/dist2)); // positive = moving toward b
    const bToward = (b.vx*(-dx/dist2) + b.vy*(-dy/dist2)); // positive = moving toward a
    [winner, loser] = aToward >= bToward ? [a,b] : [b,a];
  } else {
    if(a.health>b.health){winner=a;loser=b;}
    else if(b.health>a.health){winner=b;loser=a;}
    else{[winner,loser]=Math.random()<.5?[a,b]:[b,a];}
  }

  const lHP=loser.health, wHP=winner.health;
  if(loser.shields>0){
    loser.shields--;loser.shieldFlash=35;loser.invincible=70;winner.invincible=35;
    shieldPops.push(new ShieldPop(loser.x,loser.y));
  } else {
    winner.health=Math.max(1,winner.health-loser.health);
    winner.flashTimer=45; winner.invincible=CFG.invincFrames; winner.target=null;
    if(isShowdown){
      // SUDDEN DEATH — first real collision ends it instantly
      winner.kills++;
      addLog('💥 <span class="winner">'+esc(winner.userName)+'</span> wins the Final Showdown! <span class="loser">'+esc(loser.userName)+'</span> eliminated!', 'log-kill');
      bursts.push(new Burst(loser.x,loser.y,loser.color,loser.radius));
      // Extra dramatic burst
      bursts.push(new Burst(loser.x+20,loser.y-15,loser.color,loser.radius*.7));
      bursts.push(new Burst(loser.x-20,loser.y+10,loser.color,loser.radius*.5));
      loser.startElim();
    } else {
      winner.kills++;
      addLog('<span class="winner">'+esc(winner.userName)+'</span> <span class="hp">('+wHP+'hp)</span> ☠ <span class="loser">'+esc(loser.userName)+'</span> <span class="hp">('+lHP+'hp)</span>', 'log-kill');
      bursts.push(new Burst(loser.x,loser.y,loser.color,loser.radius));
      loser.startElim();
    }
  }
}

// ── Background ────────────────────────────────────────────────
function drawBg(){
  ctx.fillStyle='rgba(4,0,12,.9)'; ctx.fillRect(0,0,W,H);
  const ar=ARENA_RIGHT(), at=ARENA_TOP();
  ctx.strokeStyle='rgba(80,40,160,.07)'; ctx.lineWidth=1;
  const GS=64;
  for(let x=0;x<ar+GS;x+=GS){ctx.beginPath();ctx.moveTo(x,at);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=at;y<H+GS;y+=GS){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(ar,y);ctx.stroke();}
  ctx.strokeStyle='rgba(0,229,255,.02)';
  for(let i=-H;i<ar;i+=96){ctx.beginPath();ctx.moveTo(i,at);ctx.lineTo(i+H,H);ctx.stroke();}
  for(const p of dust){
    p.x+=p.vx; p.y+=p.vy;
    if(p.y<at-10){p.y=H+5;p.x=Math.random()*ar;}
    if(p.x<0)p.x=ar; if(p.x>ar)p.x=0;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.globalAlpha=p.opa;ctx.fill();ctx.globalAlpha=1;
  }
  const vgr=ctx.createRadialGradient(ar/2,H/2,H*.2,ar/2,H/2,H*.85);
  vgr.addColorStop(0,'rgba(0,0,0,0)');vgr.addColorStop(1,'rgba(0,0,0,.5)');
  ctx.fillStyle=vgr;ctx.fillRect(0,at,ar,H-at);
}

// ── Final Showdown ────────────────────────────────────────────
function triggerShowdown(fighterA, fighterB){
  phase = 'SHOWDOWN';
  // Freeze both fighters
  fighterA.vx=0; fighterA.vy=0;
  fighterB.vx=0; fighterB.vy=0;
  fighterA.invincible=99999; fighterB.invincible=99999; // immune while frozen

  // Build showdown panel
  function buildCard(el, f){
    el.innerHTML = `
      <div class="sf-initial" style="background:${f.color}33;border-color:${f.color};box-shadow:0 0 30px ${f.color}88">
        ${f.userName.charAt(0).toUpperCase()}
      </div>
      <div class="sf-name">${esc(f.userName)}</div>
      <div class="sf-hp">${f.health} hp</div>
      <div class="sf-kills">${f.kills} kill${f.kills!==1?'s':''}</div>`;
  }
  buildCard(showdownA, fighterA);
  buildCard(showdownB, fighterB);
  showdownOverlay.classList.add('visible');
  addLog('━━ FINAL SHOWDOWN: <span style="color:#ff6b35;font-weight:700">'+esc(fighterA.userName)+'</span> vs <span style="color:#ff6b35;font-weight:700">'+esc(fighterB.userName)+'</span> ━━', 'log-system');
  addLog('🔄 Full health restored to both fighters', 'log-system');
}

function beginShowdown(){
  if(phase !== 'SHOWDOWN') return;
  const alive = fighters.filter(f=>f.alive);
  if(alive.length !== 2) return;
  phase = 'SHOWDOWN_ACTIVE';
  showdownOverlay.classList.remove('visible');

  // Full HP restore
  alive.forEach(f=>{
    f.health = f.maxHealth;
    f.shields = 2; // 2 shields each — takes 3 hits to win
    f.invincible = 0;
    f.flashTimer = 0;
    // Speed surge — fast enough to feel frantic, short invinc so they circle first
    const ang = Math.random()*Math.PI*2;
    f.vx = Math.cos(ang) * 6.5;
    f.vy = Math.sin(ang) * 6.5;
    f.invincible = 80; // ~1.3s to circle before first hit is possible
    f.target = alive.find(o=>o!==f);
    f.steerCd = 0; // immediately start hunting
  });
  addLog('⚡ SUDDEN DEATH — 3 hits to win, momentum decides!', 'log-system');
}

// ── Start battle ──────────────────────────────────────────────
function startBattle(){
  if(phase!=='LOBBY'||fighters.length<2)return;
  phase='COUNTDOWN';
  startBtn.disabled=true;
  lobbyOverlay.classList.add('hidden');
  addLog('━━ Battle starting! ━━', 'log-system');
  const steps=['3','2','1','FIGHT!'];
  let i=0;
  function tick(){
    countdownNum.textContent=steps[i];
    countdownEl.style.opacity='1';
    countdownNum.style.transform='scale(1.3)';
    setTimeout(()=>countdownNum.style.transform='scale(1)',150);
    i++;
    if(i<steps.length){ setTimeout(tick,900); }
    else {
      setTimeout(()=>{
        countdownEl.style.opacity='0';
        phase='BATTLE'; t0=Date.now();
        fighters.forEach(f=>f.alive&&f.kickoffBattle());
      },700);
    }
  }
  tick();
}

// ── Main loop ─────────────────────────────────────────────────
function fmt(ms){ const s=Math.floor(ms/1000),m=Math.floor(s/60); return m+':'+(s%60<10?'0':'')+(s%60); }

function loop(){
  requestAnimationFrame(loop);
  drawBg();
  shieldPops=shieldPops.filter(s=>!s.done); for(const s of shieldPops){s.update();s.draw();}
  bursts=bursts.filter(b=>!b.done); for(const b of bursts){b.update();b.draw();}
  for(const c of confetti){c.update();c.draw();}
  for(const f of fighters) f.update(fighters);
  checkCollisions();
  for(const f of fighters) if(f.isActive) f.draw();

  if(phase==='BATTLE'||phase==='SHOWDOWN'||phase==='SHOWDOWN_ACTIVE'||phase==='DONE'){
    const alive=fighters.filter(f=>f.alive);
    const elapsed=t1?t1-t0:Date.now()-t0;
    topbarTimer.textContent='⏱ '+fmt(elapsed);
    const remaining=alive.length;
    if(phase==='SHOWDOWN'||phase==='SHOWDOWN_ACTIVE'){
      topbarCount.textContent='⚔ FINAL SHOWDOWN';
    } else {
      topbarCount.textContent=remaining+(remaining===1?' Fighter Left':' Fighters Remain');
    }
    // Trigger showdown when exactly 2 remain (only once)
    if(remaining===2 && phase==='BATTLE'){
      phase='SHOWDOWN';
      const alive2=fighters.filter(f=>f.alive);
      triggerShowdown(alive2[0], alive2[1]);
    }
    if(remaining<=1&&!t1&&(phase==='SHOWDOWN_ACTIVE'||phase==='DONE')){
      t1=Date.now(); phase='DONE';
      resetBtn.classList.add('visible');
      if(remaining===1){
        const w=alive[0];
        const allNames = fighters.map(f=>f.userName);
        const wStats = recordWin(w.userName, allNames);
        const winNum  = ordinal(wStats.wins);
        const streakTxt = wStats.streak>=2 ? ` 🔥 ${wStats.streak}-WIN STREAK!` : '';
        const killsTxt  = w.kills > 0 ? ` | ${w.kills} kill${w.kills!==1?'s':''}` : '';
        addLog('🏆 <span style="color:#ffd700;font-weight:700">'+esc(w.userName)+'</span> wins! ('+winNum+' win'+killsTxt+')'+streakTxt, 'log-system');
        setTimeout(()=>{
          winnerNameEl.textContent=w.userName;
          winnerNameEl.style.color=w.color;
          winnerNameEl.style.textShadow='0 0 30px '+w.color+',0 0 70px '+w.color+'55,0 5px 0 rgba(0,0,0,.5)';
          // Win stats line under name
          const statsLine = document.getElementById('winner-stats');
          const streakLine = wStats.streak>=3
            ? `🔥 ${wStats.streak}-WIN STREAK!`
            : wStats.streak===2 ? '🔥 2 wins in a row!' : '';
          statsLine.innerHTML =
            `${winNum} win &nbsp;·&nbsp; ${w.kills} kill${w.kills!==1?'s':''}` +
            (streakLine ? `<br><span style="color:#ff6b35;font-size:20px;letter-spacing:4px">${streakLine}</span>` : '');
          buildPepeColumn(pepeLeft);
          buildPepeColumn(pepeRight);
          setTimeout(()=>{
            document.querySelectorAll('.pepe-vid').forEach(v=>{ v.muted=true; v.play().catch(()=>{}); });
          }, 100);
          winnerOverlay.classList.add('visible');
          for(let i=0;i<200;i++) confetti.push(new Confetto());
        },800);
      }
    }
  }
}
loop();

// ── WebSocket (Streamer.bot) ──────────────────────────────────
let ws=null;
function connectWS(){
  try{
    ws=new WebSocket('ws://127.0.0.1:8080/');
    ws.onopen=()=>ws.send(JSON.stringify({request:'Subscribe',events:{General:['Custom']},id:'cobr-sub'}));
    ws.onmessage=(e)=>{
      try{
        const msg=JSON.parse(e.data), d=msg.data||{};
        // Single fighter clockout: { event:'clockout', userName:'...', health:123 }
        if(d.event==='clockout'&&d.userName&&d.health!=null){
          addFighter(d.userName, d.health, false); // log individual live joins
        }
        // Bulk load: { event:'battle_load', participants:[{userName,health},...] }
        if(d.event==='battle_load'&&Array.isArray(d.participants)){
          d.participants.forEach(p=>addFighter(p.userName, p.health, true)); // silent bulk
        }
        // Start signal from SB: { event:'battle_begin' } or legacy { event:'battle_start' }
        if(d.event==='battle_begin' || d.event==='battle_start') startBattle();
        // Begin final showdown: { event:'final_showdown_begin' }
        if(d.event==='final_showdown_begin') beginShowdown();
      }catch(err){}
    };
    ws.onclose=()=>setTimeout(connectWS,5000);
    ws.onerror=()=>ws.close();
  }catch(e){setTimeout(connectWS,5000);}
}
connectWS();
